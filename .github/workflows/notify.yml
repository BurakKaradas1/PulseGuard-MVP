name: PulseGuard CI/CD Pipeline

# Bu action sadece 'main' (veya master) branch'ine push yapıldığında tetiklensin
on:
  push:
    branches:
      - master

jobs:
  notify-mentor:
    runs-on: ubuntu-latest # GitHub arka planda bir Ubuntu sunucusu açar
    
    steps:
    - name: Kodu Sunucuya Çek
      uses: actions/checkout@v4

    - name: Mentöre Bilgilendirme E-postası Gönder
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        # GitHub Secrets kasasından bilgileri çekiyoruz
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        
        # E-posta Başlığı
        subject: "[PulseGuard Core] Yeni Kod Yüklendi - Burak Karadaş"
        
        # Gönderilecek Kişi 
        to: mert.ozturk@dataflowx.com
        
        # Gönderen İsmi
        from: PulseGuard Automations
        
        # E-postanın İçeriği (Dinamik değişkenlerle)
        body: |
          Merhaba,
          
          PulseGuard projesine yeni bir güncelleme gönderildi.
          
          Geliştirici: ${{ github.event.head_commit.author.name }}
          Commit Mesajı: "${{ github.event.head_commit.message }}"
          
          Değişiklikleri incelemek için bağlantıya tıklayabilirsiniz:
          ${{ github.event.head_commit.url }}
          
          İyi çalışmalar